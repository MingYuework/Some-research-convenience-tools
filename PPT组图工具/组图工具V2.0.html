    gridContainer.querySelectorAll('.grid-ruler').forEach(el => {

      } else {

      }

  $('#btn-add-vruler').addEventListener('click', () => addRuler('v'));
  $('#btn-clear-rulers').addEventListener('click', clearAllRulers);
  $('#ruler-color').addEventListener('input', refreshRulerAppearance);
  $('#ruler-width').addEventListener('change', refreshRulerAppearance);

  // ========== Clipboard Paste (Ctrl+V) ==========
  function processImageDataUrl(dataUrl, sourceLabel) {
    const img = new Image();
    img.onload = function() {
      if (state.activeCell >= 0 && state.activeCell < state.cells.length && !state.cells[state.activeCell].image) {
        const cell = state.cells[state.activeCell];
        cell.image = img;
        cell.imgSrc = dataUrl;
        fitViewportToCell(cell, img);
        state.zoomW[state.activeCell] = 100; state.zoomH[state.activeCell] = 100;
        renderCell(state.activeCell);
        toast('📋 已粘贴到单元格 ' + (state.activeCell + 1));
        if (state.layoutMode === 'odd-image') refreshOddImageList();
      } else {
        const pasteName = 'pasted_' + Date.now() + '.png';
        state.fileManager.push({ name: pasteName, dataUrl: dataUrl, file: null });
        renderFileList();
        toast('📋 已粘贴到资源管理器');
      }
    };
    img.onerror = function() { toast('⚠ 图片加载失败'); };
    img.src = dataUrl;
  }

  document.addEventListener('paste', (e) => {
    const tag = e.target.tagName;
    if (tag === 'TEXTAREA') return;
    if (tag === 'INPUT') {
      const type = (e.target.type || 'text').toLowerCase();
      if (type === 'text' || type === 'password' || type === 'email' || type === 'search' || type === 'url') return;
    }

    const items = e.clipboardData && e.clipboardData.items;
    if (!items || items.length === 0) return;

    // Check for image data
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        if (blob && blob.size > 64) {
          const reader = new FileReader();
          reader.onload = function(evt) { processImageDataUrl(evt.target.result, item.type); };
          reader.readAsDataURL(blob);
          return;
        }
      }
      // HTML with embedded image (e.g. from WeChat, browsers)
      if (item.type === 'text/html') {
        e.preventDefault();
        item.getAsString(function(htmlStr) {
          const m = htmlStr.match(/<img[^>]+src\s*=\s*["'](data:image\/[^"']+)["']/i) ||
                    htmlStr.match(/data:image\/(?:png|jpeg|jpg|bmp|gif|webp);base64,[A-Za-z0-9+/=]{100,}/i);
          if (m) {
            processImageDataUrl(m[1] || m[0], 'HTML');
          }
        });
        return;
      }
    }
  });

  // ========== Export ==========
  function exportImage() {
    const dpiMultiplier = parseFloat($('#export-dpi').value);
    const format = $('#export-format').value;

    const slots = computeLayoutSlots();

    // Compute total bounds from slots
    let totalW = 0, totalH = 0;
    slots.forEach(s => {
      totalW = Math.max(totalW, s.x + s.w + state.padding);
      totalH = Math.max(totalH, s.y + s.h + state.padding);
    });

    const exportW = Math.round(totalW * dpiMultiplier);
    const exportH = Math.round(totalH * dpiMultiplier);

    const canvas = document.createElement('canvas');
    canvas.width = exportW;
    canvas.height = exportH;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = state.bgColor;
    ctx.fillRect(0, 0, exportW, exportH);

    // Draw each cell from slots
    slots.forEach(slot => {
      const cell = state.cells[slot.cellIdx];
      if (!cell || !cell.image) return;
      const x = Math.round(slot.x * dpiMultiplier);
      const y = Math.round(slot.y * dpiMultiplier);
      const w = Math.round(slot.w * dpiMultiplier);
      const h = Math.round(slot.h * dpiMultiplier);

      // Draw with optional rounded corners using clip
      if (state.cellRadius > 0) {
        ctx.save();
        const r = state.cellRadius * dpiMultiplier;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.clip();
      }

      ctx.drawImage(
        cell.image,
        cell.viewX, cell.viewY, cell.viewW, cell.viewH,
        x, y, w, h
      );

      if (state.cellRadius > 0) {
        ctx.restore();
      }
    });

    // V3.0: Draw black borders around cells
    if (state.exportBorder) {
      const borderWidth = Math.max(1, Math.round(2.5 * dpiMultiplier));
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = borderWidth;
      ctx.lineJoin = 'round';

      slots.forEach(slot => {
        const x = Math.round(slot.x * dpiMultiplier);
        const y = Math.round(slot.y * dpiMultiplier);
        const w = Math.round(slot.w * dpiMultiplier);
        const h = Math.round(slot.h * dpiMultiplier);

        if (state.cellRadius > 0) {
          const r = state.cellRadius * dpiMultiplier;
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
        } else {
          ctx.strokeRect(x, y, w, h);
          return;
        }
        ctx.stroke();
      });
    }

    // Draw labels from slots
    if (state.showLabels) {
      slots.forEach(slot => {
        const x = Math.round(slot.x * dpiMultiplier);
        const y = Math.round(slot.y * dpiMultiplier);
        const w = Math.round(slot.w * dpiMultiplier);
        const h = Math.round(slot.h * dpiMultiplier);
        const fontSize = Math.round(state.labelSize * dpiMultiplier);
        const offset = state.labelOffsets[slot.cellIdx] || { dx: 0, dy: 0 };

        let labelX, labelY;
        if (state.labelPosition === 'outside-top-left') {
          // Outside to the LEFT of the cell border, 2px gap from border
          labelX = x - Math.round(2 * dpiMultiplier);
          labelY = y + fontSize + Math.round((4 + offset.dy) * dpiMultiplier);
          ctx.textAlign = 'right';
        } else {
          labelX = x + Math.round((8 + offset.dx) * dpiMultiplier);
          labelY = y + fontSize + Math.round((4 + offset.dy) * dpiMultiplier);
          ctx.textAlign = 'left';
        }

        ctx.font = `bold ${fontSize}px "${state.labelFont}", serif`;
        ctx.fillStyle = state.labelColor;
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = Math.max(1, Math.round(2 * dpiMultiplier));
        const labelText = getLabelText(slot.cellIdx);
        ctx.strokeText(labelText, labelX, labelY);
        ctx.fillText(labelText, labelX, labelY);
        ctx.textAlign = 'left'; // reset
      });
    }

    // V3.2: Draw rulers on export
    if (state.rulers.length > 0) {
      const rulerColor = $('#ruler-color').value || '#ff4444';
      const rulerLineWidth = Math.max(1, Math.round((parseInt($('#ruler-width').value) || 2) * dpiMultiplier));
      ctx.strokeStyle = rulerColor;
      ctx.lineWidth = rulerLineWidth;
      ctx.lineCap = 'round';
      ctx.setLineDash([rulerLineWidth * 3, rulerLineWidth * 2]);
      state.rulers.forEach(ruler => {
        const pos = Math.round(ruler.pos * dpiMultiplier);
        ctx.beginPath();
        if (ruler.type === 'h') {
          ctx.moveTo(0, pos);
          ctx.lineTo(exportW, pos);
        } else {
          ctx.moveTo(pos, 0);
          ctx.lineTo(pos, exportH);
        }
        ctx.stroke();
      });
      ctx.setLineDash([]);
    }

    // Download
    const ext = format === 'jpeg' ? 'jpg' : 'png';
    const mime = format === 'jpeg' ? 'image/jpeg' : 'image/png';
    const quality = format === 'jpeg' ? 0.92 : undefined;

    // Adaptive filename
    let layoutLabel;
    if (state.layoutMode === 'odd-image') {
      layoutLabel = `odd_${state.oddMainRows}x${state.oddMainCols}_${state.oddSide}`;
    } else if (state.layoutMode === 'custom') {
      layoutLabel = `custom_${state.customRows}x${state.customCols}`;
    } else {
      layoutLabel = `${state.cols}x${state.rows}`;
    }

    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const dpiLabel = Math.round(96 * dpiMultiplier);
      a.download = `figure_${layoutLabel}_${dpiLabel}dpi.${ext}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast(`✅ 已导出: ${exportW}×${exportH}px @ ${dpiLabel}DPI`);
    }, mime, quality);
  }

    if (state.layoutMode === 'uniform') {
      gridContainer.style.borderRadius = (state.cellRadius + Math.max(state.paddingX, state.paddingY)) + 'px';
    }
  });

  // Grid padding X / Y
  function applyPaddingToLayout() {
    if (state.layoutMode === 'uniform') {
      gridContainer.style.padding = state.paddingY + 'px ' + state.paddingX + 'px';
      gridContainer.style.borderRadius = (state.cellRadius + Math.max(state.paddingX, state.paddingY)) + 'px';
      positionAllLabels();
    } else {
      buildGrid();
    }
  }
  $('#grid-padding-x').addEventListener('change', function() {
    state.paddingX = Math.max(0, Math.min(200, parseInt(this.value) || 20));
    this.value = state.paddingX;
    applyPaddingToLayout();

  $('#grid-padding-y').addEventListener('change', function() {
    state.paddingY = Math.max(0, Math.min(200, parseInt(this.value) || 20));
    this.value = state.paddingY;
    applyPaddingToLayout();

  // Image pan step
  $('#image-pan-step').addEventListener('change', function() {

    this.value = state.imagePanStep;
  });

  // ========== Page zoom (Ctrl+scroll + toolbar buttons) ==========
  let pageZoom = 1;
  function updatePageZoom() {
    gridContainer.style.zoom = pageZoom;
    $('#page-zoom-pct').textContent = Math.round(pageZoom * 100) + '%';
  }
  gridScroll.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return;
    e.preventDefault();
    pageZoom = Math.max(0.2, Math.min(5, pageZoom * (e.deltaY < 0 ? 1.08 : 1 / 1.08)));
    updatePageZoom();
  }, { passive: false });
  $('#btn-zoom-in').addEventListener('click', () => { pageZoom = Math.min(5, pageZoom * 1.2); updatePageZoom(); });
  $('#btn-zoom-out').addEventListener('click', () => { pageZoom = Math.max(0.2, pageZoom / 1.2); updatePageZoom(); });
  $('#btn-zoom-reset-page').addEventListener('click', () => { pageZoom = 1; updatePageZoom(); });

  // ========== Border-drag image resize (PPT-style) ==========
  let borderDrag = null; // { cellIdx, edge, startX, startY, startVX, startVY, startVW, startVH }
  const EDGE_ZONE = 10; // px from border to detect edge

  // Hover cursor for border resize mode
  document.addEventListener('mousemove', (e) => {
    if (borderDrag) return;
    if (!state.showImageBorder) return;
    const wrapper = e.target.closest('.cell-wrapper');
    if (!wrapper) return;
    const rect = wrapper.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const nearL = x < EDGE_ZONE, nearR = x > rect.width - EDGE_ZONE;
    const nearT = y < EDGE_ZONE, nearB = y > rect.height - EDGE_ZONE;
    let edge = null;
    if (nearL && nearT) edge = 'nw'; else if (nearR && nearT) edge = 'ne';
    else if (nearL && nearB) edge = 'sw'; else if (nearR && nearB) edge = 'se';
    else if (nearL) edge = 'w'; else if (nearR) edge = 'e';
    else if (nearT) edge = 'n'; else if (nearB) edge = 's';
    const cursors = { nw:'nw-resize', ne:'ne-resize', sw:'sw-resize', se:'se-resize', n:'n-resize', s:'s-resize', e:'e-resize', w:'w-resize' };
    cellWrappers.forEach((w, i) => {
      if (!w) return;
      if (i === parseInt(wrapper.dataset.cellIndex) && edge) w.style.cursor = cursors[edge];
      else if (state.cells[i] && state.cells[i].image) w.style.cursor = 'grab';
      else w.style.cursor = '';
    });
  });

  document.addEventListener('mousemove', (e) => {
    if (!borderDrag) return;
    const bd = borderDrag;
    const cell = state.cells[bd.cellIdx];
    if (!cell || !cell.image) { borderDrag = null; return; }
    const imgW = cell.image.naturalWidth, imgH = cell.image.naturalHeight;
    const dx = e.clientX - bd.startX, dy = e.clientY - bd.startY;
    const edge = bd.edge;
    let vw = bd.startVW, vh = bd.startVH;
    const aspect = bd.startVW / bd.startVH;
    const cx = bd.startVX + bd.startVW / 2, cy = bd.startVY + bd.startVH / 2;

    if (edge.length === 2) {
      if (Math.abs(dx) >= Math.abs(dy)) {
        vw = bd.startVW + (edge.includes('e') ? dx : -dx);
        vw = Math.max(imgW * 0.02, Math.min(imgW * 5, vw));
        vh = vw / aspect;
      } else {
        vh = bd.startVH + (edge.includes('s') ? dy : -dy);
        vh = Math.max(imgH * 0.02, Math.min(imgH * 5, vh));
        vw = vh * aspect;
      }
    } else if (edge === 'w' || edge === 'e') {
      vw = bd.startVW + (edge === 'e' ? dx : -dx);
      vw = Math.max(imgW * 0.02, Math.min(imgW * 5, vw));
    } else {
      vh = bd.startVH + (edge === 's' ? dy : -dy);
      vh = Math.max(imgH * 0.02, Math.min(imgH * 5, vh));
    }

    let vx = cx - vw / 2, vy = cy - vh / 2;
    if (vx < 0) vx = 0;
    if (vy < 0) vy = 0;
    if (vx + vw > imgW) vx = imgW - vw;
    if (vy + vh > imgH) vy = imgH - vh;

    cell.viewX = vx; cell.viewY = vy; cell.viewW = vw; cell.viewH = vh;
    renderCell(bd.cellIdx);
  });
  document.addEventListener('mouseup', () => {
    if (borderDrag) {
      const idx = borderDrag.cellIdx;
      const cell = state.cells[idx];
      if (cell && cell.image) {
        state.zoomW[idx] = Math.round((cell.image.naturalWidth / cell.viewW) * 100);
        state.zoomH[idx] = Math.round((cell.image.naturalHeight / cell.viewH) * 100);
      }
      borderDrag = null;
    }
  });

  // Toggle image border resize mode (border drawn on canvas)
  $('#show-image-border').addEventListener('change', function() {
    state.showImageBorder = this.checked;
    renderAllCells(); // redraw to show/hide image border
    if (!state.showImageBorder) {
      cellWrappers.forEach(w => { if (w) w.style.cursor = ''; });
    }
  });
  $('#show-labels').addEventListener('change', function() {
    state.showLabels = this.checked;
    cellLabels.forEach(l => { if (l) l.style.display = state.showLabels ? '' : 'none'; });
  });

  // Label format
  $('#label-format').addEventListener('change', function() {
    state.labelFormat = this.value;
    refreshAllLabels();
  });

  // Label position — auto-adjust horizontal spacing for outside labels
  let _savedGapX = null, _savedPaddingX = null;
  $('#label-position').addEventListener('change', function() {
    state.labelPosition = this.value;
    if (state.labelPosition === 'outside-top-left') {
      const minGapX = Math.max(state.gapX, Math.round(state.labelSize * 2.2) + 12);
      const minPaddingX = Math.max(state.paddingX, Math.round(state.labelSize * 1.6) + 6);
      let needRebuild = false;
      if (state.gapX < minGapX) {
        if (_savedGapX === null) _savedGapX = state.gapX;
        state.gapX = minGapX;
        $('#cell-gap-x').value = state.gapX;
        needRebuild = true;
      }
      if (state.paddingX < minPaddingX) {
        if (_savedPaddingX === null) _savedPaddingX = state.paddingX;
        state.paddingX = minPaddingX;
        $('#grid-padding-x').value = state.paddingX;
        needRebuild = true;
      }
      if (needRebuild) { applyGapToLayout(); applyPaddingToLayout(); }
    } else {
      let needRebuild = false;
      if (_savedGapX !== null) {
        state.gapX = _savedGapX;
        $('#cell-gap-x').value = state.gapX;
        _savedGapX = null;
        needRebuild = true;
      }
      if (_savedPaddingX !== null) {
        state.paddingX = _savedPaddingX;
        $('#grid-padding-x').value = state.paddingX;
        _savedPaddingX = null;
        needRebuild = true;
      }
      if (needRebuild) { applyGapToLayout(); applyPaddingToLayout(); }
    }
    refreshAllLabels();
  });

  // Label size
  $('#label-size').addEventListener('change', function() {
    state.labelSize = Math.max(8, Math.min(60, parseInt(this.value) || 18));
    this.value = state.labelSize;
    refreshAllLabels();
  });

  // Label color
  $('#label-color').addEventListener('input', function() {
    state.labelColor = this.value;
    cellLabels.forEach(l => { if (l) l.style.color = state.labelColor; });
  });

  // Label font
  $('#label-font').addEventListener('change', function() {
    state.labelFont = this.value;
    cellLabels.forEach(l => { if (l) l.style.fontFamily = state.labelFont + ', serif'; });
  });

  // V3.0: Label move buttons
  $('#label-move-up').addEventListener('click', () => moveLabel(0, -state.labelMoveStep));
  $('#label-move-down').addEventListener('click', () => moveLabel(0, state.labelMoveStep));
  $('#label-move-left').addEventListener('click', () => moveLabel(-state.labelMoveStep, 0));
  $('#label-move-right').addEventListener('click', () => moveLabel(state.labelMoveStep, 0));
  $('#label-move-reset').addEventListener('click', resetLabelPosition);
  $('#label-move-step').addEventListener('change', function() {
    state.labelMoveStep = Math.max(1, Math.min(50, parseInt(this.value) || 5));
    this.value = state.labelMoveStep;
  });

  // V3.0: Export border toggle
  $('#export-border').addEventListener('change', function() {
    state.exportBorder = this.checked;
  });

  // Export
  $('#btn-export').addEventListener('click', exportImage);

  // Clear all
  $('#btn-clear-all').addEventListener('click', clearAllCells);

  // ========== Layout Mode Switching ==========
  function switchLayoutMode(mode) {
    state.layoutMode = mode;
    // Update mode buttons
    document.querySelectorAll('#layout-mode-btns button').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });

    // Show/hide panels
    $('#uniform-panel').style.display = (mode === 'uniform') ? '' : 'none';
    $('#odd-image-panel').classList.toggle('show', mode === 'odd-image');
    $('#custom-panel').classList.toggle('show', mode === 'custom');
    // Grid presets only for uniform mode
    document.getElementById('grid-presets').style.display = (mode === 'uniform') ? '' : 'none';

    // Initialize config defaults
    if (mode === 'odd-image') {
      refreshOddImageList();
    } else if (mode === 'custom') {
      initRowConfigs();
      buildRowConfigsUI();
    }

    initCells();
    buildGrid();
  }

  document.querySelectorAll('#layout-mode-btns button').forEach(btn => {
    btn.addEventListener('click', () => switchLayoutMode(btn.dataset.mode));
  });

  // ========== Odd-Image Panel Handlers ==========
  $('#apply-odd-grid').addEventListener('click', () => {
    state.oddMainRows = Math.max(1, Math.min(6, parseInt($('#odd-rows').value) || 2));
    state.oddMainCols = Math.max(1, Math.min(6, parseInt($('#odd-cols').value) || 2));
    $('#odd-rows').value = state.oddMainRows;
    $('#odd-cols').value = state.oddMainCols;
    state.oddImageSlotIndex = null; // reset to default
    initCells();
    buildGrid();
    refreshOddImageList();
  });

  $('#odd-side').addEventListener('change', function() {
    state.oddSide = this.value;
    buildGrid();
  });

  function refreshOddImageList() {
    const container = $('#odd-image-list');
    const totalCells = state.oddMainRows * state.oddMainCols + 1;
    $('#odd-total-cells').textContent = totalCells;

    // Count loaded images
    let loadedCount = 0;
    state.cells.forEach(c => { if (c.image) loadedCount++; });
    $('#odd-loaded-count').textContent = loadedCount;

    if (loadedCount === 0) {
      container.innerHTML = '<span style="font-size:11px;color:var(--text2);">暂无图片，请先加载图片到单元格</span>';
      return;
    }

    const oddIdx = state.oddImageSlotIndex != null ? state.oddImageSlotIndex : (totalCells - 1);
    let html = '';
    state.cells.forEach((cell, i) => {
      if (!cell.image) return;
      const isOdd = (i === oddIdx);
      const isSelected = !isOdd;
      html += `<div class="img-chip${isSelected ? ' selected' : ''}${isOdd ? ' odd-one' : ''}"
        data-idx="${i}" title="单元格 ${i + 1}">
        ${isOdd ? '⭐ ' : ''}图${i + 1}
      </div>`;
    });
    container.innerHTML = html || '<span style="font-size:11px;color:var(--text2);">暂无图片</span>';

    // Click handlers
    container.querySelectorAll('.img-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const idx = parseInt(chip.dataset.idx);
        state.oddImageSlotIndex = idx;
        // Reset displayW/H before rebuild
        state.cells.forEach(c => { c.displayW = null; c.displayH = null; });
        buildGrid();
        refreshOddImageList();
      });
    });
  }

  // ========== Custom Layout Panel Handlers ==========
  $('#apply-custom-grid').addEventListener('click', () => {
    state.customRows = Math.max(1, Math.min(10, parseInt($('#custom-rows').value) || 2));
    state.customCols = Math.max(1, Math.min(10, parseInt($('#custom-cols').value) || 3));
    $('#custom-rows').value = state.customRows;
    $('#custom-cols').value = state.customCols;
    initRowConfigs();
    buildRowConfigsUI();
    initCells();
    buildGrid();
  });

  function buildRowConfigsUI() {
    const container = $('#row-configs-container');
    let html = '';
    for (let r = 0; r < state.customRows; r++) {
      const cfg = state.rowConfigs[r] || { count: state.customCols, extraSpanPos: null };
      const count = cfg.count || state.customCols;
      const maxCols = state.customCols;

      // Determine if we need span position selector
      let spanSelectHtml = '';
      if (count < maxCols && maxCols % count !== 0) {
        const extra = maxCols % count;
        spanSelectHtml = `<select class="span-pos-select" data-row="${r}" data-field="extraSpanPos">
          <option value="">自动分配</option>`;
        for (let i = 0; i < count; i++) {
          const sel = (cfg.extraSpanPos === i) ? ' selected' : '';
          spanSelectHtml += `<option value="${i}"${sel}>第${i + 1}个图占额外宽度</option>`;
        }
        spanSelectHtml += '</select>';
      }

      html += `<div class="row-config-item">
        <span>第${r + 1}行:</span>
        <select data-row="${r}" data-field="count" style="width:50px;">
          ${Array.from({length: maxCols}, (_, i) =>
            `<option value="${i + 1}"${(i + 1 === count) ? ' selected' : ''}>${i + 1}</option>`
          ).join('')}
        </select>
        <span style="font-size:10px;color:var(--text2);">/ ${maxCols} 列</span>
        ${spanSelectHtml}
      </div>`;
    }
    container.innerHTML = html;

    // Wire up change events
    container.querySelectorAll('select[data-field="count"]').forEach(sel => {
      sel.addEventListener('change', function() {
        const r = parseInt(this.dataset.row);
        state.rowConfigs[r].count = parseInt(this.value);
        buildRowConfigsUI(); // refresh to show/hide span selector
        initCells();
        buildGrid();
      });
    });
    container.querySelectorAll('select[data-field="extraSpanPos"]').forEach(sel => {
      sel.addEventListener('change', function() {
        const r = parseInt(this.dataset.row);
        const val = this.value;
        state.rowConfigs[r].extraSpanPos = (val === '') ? null : parseInt(val);
        initCells();
        buildGrid();
      });
    });
  }

  // ========== Global Drag and Drop (onto grid area) ==========
  gridScroll.addEventListener('dragover', (e) => { e.preventDefault(); });
  gridScroll.addEventListener('drop', (e) => {
    e.preventDefault();
    // Find the cell under the drop point
    const wrapper = e.target.closest('.cell-wrapper');
    if (wrapper) {
      const idx = parseInt(wrapper.dataset.cellIndex);

      // V3.1: Check file manager drag first
      const fmData = e.dataTransfer.getData('text/plain');
      if (fmData && fmData.startsWith('file-manager:')) {
        const fmIndex = parseInt(fmData.split(':')[1]);
        if (!isNaN(fmIndex) && fmIndex >= 0 && fmIndex < state.fileManager.length) {
          loadImageToCellFromDataUrl(idx, state.fileManager[fmIndex].dataUrl, state.fileManager[fmIndex].name);
          return;
        }
      }

      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        loadImageToCell(idx, file);
      }
    }
  });

  // ========== Keyboard Shortcuts ==========
  document.addEventListener('keydown', (e) => {
    // Don't capture when typing in inputs (except label move step)
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
      // Allow arrow keys for label move step input
      if (e.target.id !== 'label-move-step') return;
    }

    // V3.0: Arrow keys for label movement
    if (state.selectedLabel >= 0 && !cropOverlay.classList.contains('show')) {
      const step = state.labelMoveStep;
      switch (e.key) {
        case 'ArrowUp':
          e.preventDefault();
          moveLabel(0, -step);
          return;
        case 'ArrowDown':
          e.preventDefault();
          moveLabel(0, step);
          return;
        case 'ArrowLeft':
          e.preventDefault();
          moveLabel(-step, 0);
          return;
        case 'ArrowRight':
          e.preventDefault();
          moveLabel(step, 0);
          return;
      }
    }

    // V3.3: Arrow keys for image panning (when cell is active, no label selected)
    if (state.activeCell >= 0 && state.selectedLabel < 0 && !cropOverlay.classList.contains('show')) {
      const cell = state.cells[state.activeCell];
      if (cell && cell.image) {
        const step = state.imagePanStep;
        const cw = cell.displayW || state.cellW;
        const ch = cell.displayH || state.cellH;
        const pxPerImgX = cell.viewW / cw;
        const pxPerImgY = cell.viewH / ch;
        switch (e.key) {
          case 'ArrowUp':
            e.preventDefault();
            cell.viewY = Math.max(-cell.viewH * 0.2, cell.viewY - step * pxPerImgY);
            renderCell(state.activeCell);
            return;
          case 'ArrowDown':
            e.preventDefault();
            cell.viewY = Math.min(cell.image.naturalHeight - cell.viewH * 0.8, cell.viewY + step * pxPerImgY);
            renderCell(state.activeCell);
            return;
          case 'ArrowLeft':
            e.preventDefault();
            cell.viewX = Math.max(-cell.viewW * 0.2, cell.viewX - step * pxPerImgX);
            renderCell(state.activeCell);
            return;
          case 'ArrowRight':
            e.preventDefault();
            cell.viewX = Math.min(cell.image.naturalWidth - cell.viewW * 0.8, cell.viewX + step * pxPerImgX);
            renderCell(state.activeCell);
            return;
        }
      }
    }

    // Ctrl+E = export
    if (e.ctrlKey && e.key === 'e') {
      e.preventDefault();
      exportImage();
    }
    // Ctrl+Shift+C = clear all
    if (e.ctrlKey && e.shiftKey && e.key === 'C') {
      e.preventDefault();
      clearAllCells();
    }
  });

  // ========== Handle window resize for crop editor ==========
  window.addEventListener('resize', () => {
    if (cropOverlay.classList.contains('show') && state.cropState) {
      renderCropCanvas();
      updateCropOverlay();
    }
  });

  // ========== Initialize ==========
  initRowConfigs();
  initCells();
  buildGrid();
  updateLabelMoveUI();
  updateGridInfo();
  toast('就绪 | V2.0: 侧栏UI重构 | 水平/垂直间距 | 标签独立图层 | 比率锁定修复');

})();
</script>
</body>
</html>
